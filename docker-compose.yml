services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: podcast-nginx
    depends_on:
      podcast-backend:
        condition: service_healthy
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-31.130.132.238}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - nginx_certs:/etc/nginx/certs
    restart: unless-stopped

  podcast-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: podcast-backend
    environment:
      PODCAST_BACKEND_ADDR: 0.0.0.0:8787
      PODCAST_BACKEND_DATA: /app/data/app_state.json
      PODCAST_BACKEND_RESOURCES: /app/resurs
      PODCAST_PUBLIC_BASE_URL: ${PODCAST_PUBLIC_BASE_URL:-http://31.130.132.238}
      RUST_LOG: ${RUST_LOG:-podcast_backend=info,tower_http=info}
    expose:
      - "8787"
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - podcast_backend_data:/app/data
      - podcast_backend_resources:/app/resurs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8787/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  nginx_certs:
  podcast_backend_data:
  podcast_backend_resources:
